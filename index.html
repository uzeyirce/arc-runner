<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$RUNNER — Arc Testnet</title>
<style>
  /* Aynı CSS'yi yukarıdaki orijinal koddan kopyala (kısaca) */
  :root { --bg:#080B14; --panel:#0E1424; --line:#1E2740; --blue:#1F6FEB; --cyan:#0BC5C5; --text:#E7ECF7; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; display:flex; flex-direction:column; align-items:center; padding:20px; }
  .wrap { max-width:780px; width:100%; }
  canvas { width:100%; max-width:760px; background:#0E1424; border:1px solid #1E2740; border-radius:12px; display:block; }
  .hud { position:absolute; top:12px; left:12px; right:12px; display:flex; justify-content:space-between; font-size:13px; color:#8C97B4; pointer-events:none; }
  .hud b { color:#2DD4D4; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; background:rgba(8,11,20,0.75); border-radius:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h2 style="margin-bottom:8px;">$RUNNER — Arc Testnet</h2>
  <div style="position:relative; max-width:760px;">
    <canvas id="game" width="760" height="280"></canvas>
    <div class="hud">
      <span>score <b id="score">0</b></span>
      <span>best <b id="best">0</b></span>
    </div>
    <div class="overlay" id="overlay">
      <h2>connect wallet to play</h2>
      <button onclick="connectWallet()" style="padding:12px 28px; border-radius:999px; background:linear-gradient(#1F6FEB,#0BC5C5); color:#04101f; border:none; font-weight:700;">Connect Wallet & Pay 0.1 USDC</button>
    </div>
  </div>
</div>

<script>
// === OYUN KODU (Kaktüs Engel + Bu Maskot) ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mascot = new Image();
mascot.src = 'mascot.jpg';   // ← Bu görseli kullan

let W = 760, H = 280;
let score = 0, best = localStorage.getItem('runner_best') || 0;
let gameState = 'locked';
let frame = 0, speed = 5;
let obstacles = [];
const bird = { x: 80, y: 180, w: 52, h: 44, vy: 0, onGround: true };
const GROUND_Y = 220;

function resetGame() {
  score = 0; speed = 5; frame = 0; obstacles = [];
  bird.y = GROUND_Y - bird.h; bird.vy = 0; bird.onGround = true;
}

function jump() {
  if (gameState === 'ready' || gameState === 'playing') {
    if (bird.onGround) { bird.vy = -11.5; bird.onGround = false; }
  }
  if (gameState === 'over') {
    document.getElementById('overlay').style.display = 'flex';
  }
}

function spawnCactus() {
  obstacles.push({ x: W + 30, type: 'cactus' });
}

function drawCactus(o) {
  ctx.fillStyle = '#4ade80';
  ctx.strokeStyle = '#166534';
  ctx.lineWidth = 3;

  // Ana gövde
  ctx.fillRect(o.x, o.y - 50, 18, 55);
  ctx.strokeRect(o.x, o.y - 50, 18, 55);

  // Sol kol
  ctx.fillRect(o.x - 12, o.y - 35, 14, 8);
  ctx.strokeRect(o.x - 12, o.y - 35, 14, 8);

  // Sağ kol
  ctx.fillRect(o.x + 16, o.y - 42, 14, 8);
  ctx.strokeRect(o.x + 16, o.y - 42, 14, 8);
}

function drawBird() {
  const bob = bird.onGround ? Math.sin(frame * 0.35) * 1.5 : 0;
  ctx.save();
  ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2 + bob);
  if (mascot.complete) {
    ctx.drawImage(mascot, -bird.w/2, -bird.h/2, bird.w, bird.h);
  } else {
    ctx.fillStyle = '#1F6FEB';
    ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
  }
  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  // Zemin
  ctx.fillStyle = '#141B31';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  if (gameState === 'playing') {
    frame++;
    speed = 5 + Math.min(score / 80, 4);
    bird.vy += 0.65;
    bird.y += bird.vy;
    if (bird.y >= GROUND_Y - bird.h) { bird.y = GROUND_Y - bird.h; bird.vy = 0; bird.onGround = true; }

    if (frame % 48 === 0) spawnCactus();

    obstacles.forEach(o => o.x -= speed);
    obstacles = obstacles.filter(o => o.x > -40);

    // Çarpışma
    obstacles.forEach(o => {
      if (bird.x < o.x + 22 && bird.x + bird.w > o.x && bird.y < o.y && bird.y + bird.h > o.y - 50) {
        gameState = 'over';
        if (score > best) { best = score; localStorage.setItem('runner_best', best); }
      }
    });

    document.getElementById('score').textContent = score;
  }

  drawBird();
  obstacles.forEach(o => drawCactus(o));

  requestAnimationFrame(loop);
}

// Kontroller
window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); });
canvas.addEventListener('pointerdown', jump);

// Başlangıç
loop();
document.getElementById('overlay').style.display = 'flex';
</script>
</body>
</html>
